 <!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add User</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f4f6f9;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:100%;
    max-width:450px;
    background:#fff;
    padding:35px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
}

input:focus, select:focus{
    outline:none;
    border-color:#007bff;
}

.btn{
    width:100%;
    padding:12px;
    background:#28a745;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.btn:hover{
    background:#218838;
}

.back-link{
    display:block;
    text-align:center;
    margin-top:15px;
    color:#007bff;
    text-decoration:none;
}

.back-link:hover{
    text-decoration:underline;
}

</style>

</head>

<body>
   
<div id="toast" class="toast"></div>

<style>
.toast {
    position: fixed;
    top: 20px;
    right: 20px;
    min-width: 250px;
    max-width: 320px;
    padding: 14px 18px;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    display: none;
    box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    z-index: 9999;
    animation: slideIn 0.3s ease;
}

.toast.show {
    display: block;
}

.toast.success {
    background: #28a745;
}

.toast.error {
    background: #dc3545;
}

@keyframes slideIn {
    from {
        transform: translateX(100px);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}
</style>



<div class="container">

    <h2>Add New User</h2>

    <form action="/insert" method="POST">

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" required>
        </div>

       <!-- NEW PASSWORD FIELD -->
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <!--  ROLE (optional for admin creation) -->
        <div class="form-group">
            <label>Role</label>
            <select name="role">
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <button type="submit" class="btn">
            Add User
        </button>

    </form>

    <a href="/" class="back-link">
        Back to Dashboard
    </a>

</div>
<script>
function showToast(message, type="success") {

    const toast = document.getElementById("toast");

    toast.innerText = message;
    toast.className = "toast show " + type;

    setTimeout(() => {
        toast.className = "toast";
    }, 3000);
}
</script>
</body>

</html>
