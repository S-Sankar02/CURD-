<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit User</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        h2{
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .form-group{
            margin-bottom: 18px;
        }

        label{
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
        }

        input{
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }

        input:focus{
            outline: none;
            border-color: #007bff;
        }

        .btn{
            width: 100%;
            padding: 12px;
            background: #ffc107;
            color: black;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover{
            background: #e0a800;
        }

        .back-link{
            display: block;
            text-align: center;
            margin-top: 18px;
            text-decoration: none;
            color: #007bff;
        }

        .back-link:hover{
            text-decoration: underline;
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>Edit User</h2>

        <form action="/update/{{ user[0] }}" method="POST">

            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" value="{{ user[1] }}" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ user[2] }}" required>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" value="{{ user[3] }}" required>
            </div>

            <button type="submit" class="btn">
                Update User
            </button>

        </form>

        <a href="/dashboard" class="back-link">Back to Dashboard</a>
    

    </div>

</body>

</html>
