<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background: whitesmoke;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-container{
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .form-group{
            margin-bottom: 20px;
        }

        label{
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input{
            width: 100%;
            padding: 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        input:focus{
            outline: none;
            border-color: #28a745;
        }

        .register-btn{
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #28a745;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .register-btn:hover{
            background: #218838;
        }

        .extra-links{
            margin-top: 20px;
            text-align: center;
        }

        .extra-links a{
            text-decoration: none;
            color: #007bff;
        }

    </style>

</head>

<body>

    <div class="register-container">

        <h2>Create Account</h2>

        <form action="/register_user" method="POST">

            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="register-btn">
                Register
            </button>

        </form>

        <div class="extra-links">

            <a href="/login">
                Already have an account?
            </a>

        </div>

    </div>

</body>

</html>
