<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Page</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container{
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .login-container h2{
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 30px;
        }

        .form-group{
            margin-bottom: 20px;
        }

        .form-group label{
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
        }

        .form-group input{
            width: 100%;
            padding: 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.3s;
        }

        .form-group input:focus{
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
        }

        .login-btn{
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover{
            background: #0056b3;
        }

        .extra-links{
            margin-top: 20px;
            text-align: center;
        }

        .extra-links a{
            display: block;
            margin-top: 10px;
            text-decoration: none;
            color: #007bff;
            font-size: 15px;
        }

        .extra-links a:hover{
            text-decoration: underline;
        }

        @media(max-width: 500px){

            .login-container{
                margin: 20px;
                padding: 30px;
            }

        }

    </style>

</head>

<body>

    <div class="login-container">

        <h2>Login</h2>

        <form action="/login_user" method="POST">

            <div class="form-group">

                <label>Email</label>

                <input type="email"
                       name="email"
                       placeholder="Enter your email"
                       required>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input type="password"
                       name="password"
                       placeholder="Enter your password"
                       required>

            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

        </form>

        <div class="extra-links">

            <a href="/register">
                Create New Account
            </a>

            <a href="/forgot_password">
                Forgot Password?
            </a>

        </div>

    </div>

</body>

</html>
